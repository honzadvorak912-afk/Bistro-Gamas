<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold2:#e8d49e;--green:#1a2e1e;--green2:#243328;--green3:#2e4035;--cream:#f5f2ec;--text:#2a2a2a;--muted:#6b6b6b}
html{scroll-behavior:smooth}
body{font-family:'Mulish',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:22px 56px;background:transparent;transition:all .4s}
nav.scrolled{background:var(--green);padding:14px 56px}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:#fff;text-decoration:none}
.logo em{font-style:italic;color:var(--gold)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.7);text-decoration:none;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* HERO */
.hero{height:100vh;position:relative;display:flex;align-items:flex-end;padding:80px 56px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:url('https://honzadvorak912-afk.github.io/Bistro-Gamas/phoca_thumb_m_rauty001-0001.jpg"nav">

    <li><a href="fotogalerie.html">Fotogalerie</a></li>
    <li><a href="kontakt.html">Kontakt</a></li>
  </ul>
</nav>
<div class="mobile-menu" id="mob"><a href="index.html">Domu</a><a href="jidelni-listek.html">Jidelni listek</a><a href="catering.html">Catering</a><a href="fotogalerie.html">Fotogalerie</a><a href="kontakt.html">Kontakt</a></div>


<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content">
    <div class="hero-tag">Catering · Rauty · Firemní akce</div>
    <h1 class="hero-title">Váš event,<br>naše <em>vášeň</em></h1>
    <p class="hero-text">Zajistíme vám kompletní catering pro firemní akce, oslavy, svatby i rauty. Čerstvé suroviny, domácí chuť, profesionální obsluha.</p>
    <div class="hero-btns">
      <a href="kontakt.html" class="btn-gold">Nezávazná poptávka</a>
      <a href="fotogalerie.html" class="btn-outline">Naše rauty</a>
    </div>
  </div>
</section>

<section class="services">
  <div class="services-header">
    <p class="tag reveal">Co nabízíme</p>
    <h2 class="title reveal d1">Kompletní <em>catering</em><br>od A do Z</h2>
  </div>
  <div class="services-grid">
    <div class="service-card reveal">
      <div class="service-num">01</div>
      <p class="tag">Firemní akce</p>
      <h3>Firemní <em>catering</em></h3>
      <p>Příprava občerstvení pro konference, meetingy, teambuildingové akce a firemní oslavy. Přizpůsobíme se počtu hostů i vašemu rozpočtu.</p>
    </div>
    <div class="service-card reveal d1">
      <div class="service-num">02</div>
      <p class="tag">Oslavy</p>
      <h3>Rauty &amp; <em>oslavy</em></h3>
      <p>Narozeninové oslavy, jubilea, promoce a rodinné slavnosti. Připravíme teplé i studené mísy, dezerty a vše, co k oslavě patří.</p>
    </div>
    <div class="service-card reveal d2">
      <div class="service-num">03</div>
      <p class="tag">Svatby</p>
      <h3>Svatební <em>hostina</em></h3>
      <p>Váš velký den si zaslouží dokonalé jídlo. Připravíme menu na míru, dort od cukrárny NOPEK a postaráme se o vše od přípravy po úklid.</p>
    </div>
  </div>
</section>

<section class="process">
  <div style="text-align:center">
    <p class="tag reveal" style="color:var(--gold2)">Jak to funguje</p>
    <h2 class="title reveal d1">Jednoduché <em>4 kroky</em></h2>
  </div>
  <div class="process-grid">
    <div class="process-step reveal">
      <div class="step-num">1</div>
      <h4>Kontakt</h4>
      <p>Napište nebo zavolejte nám. Sdělte nám základní informace o vaší akci.</p>
    </div>
    <div class="process-step reveal d1">
      <div class="step-num">2</div>
      <h4>Konzultace</h4>
      <p>Probereme společně vaše přání, počet hostů, místo a datum akce.</p>
    </div>
    <div class="process-step reveal d2">
      <div class="step-num">3</div>
      <h4>Nabídka</h4>
      <p>Připravíme vám individuální nabídku a menu přímo na míru vaší akce.</p>
    </div>
    <div class="process-step reveal d3">
      <div class="step-num">4</div>
      <h4>Realizace</h4>
      <p>O vše se postaráme — příprava, doprava, obsluha i úklid po akci.</p>
    </div>
  </div>
</section>

  <div class="gallery-item"><img src="https://honzadvorak912-afk.github.io/Bistro-Gamas/phoca_thumb_m_rauty001-0001.jpg" alt="Menu"></div>

<script>
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>60),{passive:true});
const reveals=document.querySelectorAll('.reveal');
reveals.forEach(el=>new IntersectionObserver(e=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('visible')),{threshold:.1}).observe(el));

var _h=document.getElementById("hbg"),_m=document.getElementById("mob");if(_h&&_m){_h.addEventListener("click",function(){_h.classList.toggle("open");_m.classList.toggle("open");});}
</script>
