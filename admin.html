<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Bistro Gamas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--dark:#1a1610;--bg:#f5f2ec;--white:#fff;--border:#e0d8cc;--muted:#8a7e6e;--text:#2c2218;--red:#c0392b;--green:#27ae60}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark)}
.box{background:var(--white);padding:48px;width:100%;max-width:400px;border-radius:4px}
.box h2{font-size:22px;font-weight:500;color:var(--dark);margin-bottom:8px}
.box h2 span{color:var(--gold);font-style:italic}
.box p{font-size:13px;color:var(--muted);margin-bottom:32px}
.box label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:500}
.box input{width:100%;font-family:"DM Sans",sans-serif;font-size:15px;padding:12px 14px;border:1px solid var(--border);border-radius:3px;outline:none;margin-bottom:20px;transition:.2s}
.box input:focus{border-color:var(--gold)}
.box button{width:100%;font-family:"DM Sans",sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:500;background:var(--dark);color:var(--gold);border:none;padding:14px;cursor:pointer;border-radius:3px}
.err{color:var(--red);font-size:13px;margin-top:12px;display:none;text-align:center}
#app{display:none}
.hdr{background:var(--dark);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.hdr .logo{font-size:18px;font-weight:500;color:#fff}
.hdr .logo span{color:var(--gold);font-style:italic}
.badge{font-size:11px;background:rgba(201,168,76,.15);color:var(--gold);padding:4px 12px;border-radius:20px}
.wrap{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 57px)}
.side{background:var(--white);border-right:1px solid var(--border);padding:24px 0}
.side-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 24px 6px;font-weight:500}
.side-btn{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;color:var(--text);border:none;background:none;width:100%;text-align:left;transition:.15s}
.side-btn:hover{background:var(--bg);color:var(--gold)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.main{padding:28px 36px;overflow-y:auto}
.main-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.main-hdr h2{font-size:20px;font-weight:500}
.acts{display:flex;gap:10px}
.btn{font-family:"DM Sans",sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:500;padding:10px 20px;border-radius:3px;cursor:pointer;border:none;transition:.2s}
.btn-gold{background:var(--gold);color:var(--dark)}.btn-gold:hover{background:#b8922a}
.btn-out{background:var(--white);color:var(--text);border:1px solid var(--border)}.btn-out:hover{border-color:var(--gold);color:var(--gold)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#a93226}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:18px 22px}
.stat small{font-size:12px;color:var(--muted);display:block;margin-bottom:4px}
.stat strong{font-size:26px;font-weight:500;color:var(--dark);display:block}
.banner{background:#fdf6e8;border:1px solid rgba(201,168,76,.3);border-radius:4px;padding:14px 18px;display:none;align-items:center;justify-content:space-between;margin-bottom:20px}
.banner.on{display:flex}
.banner p{font-size:14px;color:#7a5c1e}
.status{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:16px 20px;margin-top:20px;font-size:13px;color:var(--muted);line-height:1.7}
.status a{color:var(--gold)}
.cat{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:16px;overflow:hidden}
.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:#fafaf8}
.cat-hdr-l{display:flex;align-items:center;gap:10px}
.cat-icon{width:30px;height:30px;background:var(--bg);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px}
.cat-name{font-family:"DM Sans",sans-serif;font-size:15px;font-weight:500;border:none;background:transparent;outline:none;color:var(--dark);width:200px}
.cat-name:focus{border-bottom:1px solid var(--gold)}
.cat-meta{font-size:12px;color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.ci{font-family:"DM Sans",sans-serif;border:none;background:transparent;outline:none;color:var(--text);width:100%;padding:3px 5px;font-size:14px}
.ci.n{font-weight:500}
.ci.d{font-size:13px;color:var(--muted)}
.ci.g{font-size:13px;color:var(--muted);width:80px}
.ci.p{color:var(--gold);font-weight:500;width:90px}
.ci:focus{background:var(--bg);border-bottom:1px solid var(--gold)}
.ra{display:flex;gap:4px;opacity:0;transition:.15s}
tr:hover .ra{opacity:1}
.del{background:none;border:1px solid var(--border);border-radius:3px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--muted);transition:.15s}
.del:hover{border-color:var(--red);color:var(--red)}
.add-row{padding:10px 14px;border-top:1px solid var(--border)}
.add-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:3px;transition:.2s}
.add-btn:hover{color:var(--gold);background:var(--bg)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:14px 22px;border-radius:4px;font-size:14px;transform:translateY(80px);opacity:0;transition:.3s;z-index:999;border-left:3px solid var(--green)}
.toast.on{transform:none;opacity:1}
.pass-box{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:24px;margin-top:16px}
.pass-box h3{font-size:14px;font-weight:500;margin-bottom:4px}
.pass-hint{font-size:12px;color:var(--muted);margin-bottom:16px}
.pass-row{display:flex;gap:10px;flex-wrap:wrap}
.pass-row input{flex:1;min-width:140px;font-family:"DM Sans",sans-serif;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:3px;outline:none;transition:.2s}
.pass-row input:focus{border-color:var(--gold)}
@media(max-width:900px){.wrap{grid-template-columns:1fr}.side{display:none}.stats{grid-template-columns:1fr 1fr}.main{padding:16px}}
</style>
</head>
<body>

<div id="login">
 <div class="box">
  <h2>Bistro <span>Gamas</span></h2>
  <p>Administrace jidelniho listku</p>
  <label>Heslo</label>
  <input type="password" id="pwd" placeholder="Zadejte heslo">
  <button id="loginBtn">Prihlasit se</button>
  <p class="err" id="err">Nespravne heslo, zkuste znovu.</p>
 </div>
</div>

<div id="app">
 <div class="hdr">
  <div class="logo">Bistro <span>Gamas</span> &nbsp;·&nbsp; <span style="font-size:13px;color:rgba(255,255,255,.4)">Admin</span></div>
  <span class="badge">Jidelni listek</span>
 </div>
 <div class="wrap">
  <div class="side">
   <div style="padding:0 16px">
    <div class="side-lbl">Kategorie</div>
    <div id="sideCats"></div>
    <button class="side-btn" id="addCatBtn">+ Pridat kategorii</button>
   </div>
   <div style="padding:0 16px;margin-top:20px;border-top:1px solid var(--border);padding-top:14px">
    <div class="side-lbl">Akce</div>
    <button class="side-btn" id="pubBtn2"><span class="dot" style="background:var(--green)"></span>Publikovat na web</button>
    <button class="side-btn" id="viewBtn"><span class="dot"></span>Zobrazit web</button>
    <button class="side-btn" id="passBtn"><span class="dot"></span>Zmenit heslo</button>
   </div>
  </div>
  <div class="main">
   <div class="banner" id="banner">
    <p>Mate neulozene zmeny</p>
    <button class="btn btn-gold" id="pubBannerBtn">Publikovat na web</button>
   </div>
   <div class="main-hdr">
    <h2>Sprava jidelniho listku</h2>
    <div class="acts">
     <button class="btn btn-out" id="addCatBtn2">+ Nova kategorie</button>
     <button class="btn btn-gold" id="pubBtn">Publikovat na web</button>
    </div>
   </div>
   <div class="stats" id="stats"></div>
   <div id="cats"></div>
   <div class="status" id="status"></div>
   <div class="pass-box" id="passSection">
    <h3>Zmena hesla</h3>
    <p class="pass-hint">Aktualni heslo: <strong id="curPass"></strong></p>
    <div class="pass-row">
     <input type="password" id="np1" placeholder="Nove heslo">
     <input type="password" id="np2" placeholder="Zopakujte">
     <button class="btn btn-out" id="savePassBtn">Ulozit</button>
    </div>
   </div>
  </div>
 </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SK="gamas_menu_v1", PUB="gamas_menu_published", AT="gamas_menu_published_at", SP="gamas_admin_pass";
var menu = [];
var DEF_PASS = "gamas2024";

function getPass() {
  var p = localStorage.getItem(SP);
  return (p && p.length >= 4) ? p : DEF_PASS;
}

function checkLogin() {
  var v = document.getElementById("pwd").value;
  if (v === getPass()) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    initApp();
  } else {
    document.getElementById("err").style.display = "block";
    document.getElementById("pwd").select();
  }
}

function initApp() {
  var s = localStorage.getItem(SK);
  if (s) {
    menu = JSON.parse(s);
    for (var i = 0; i < menu.length; i++) {
      for (var j = 0; j < menu[i].items.length; j++) {
        if (!menu[i].items[j].gramaz) menu[i].items[j].gramaz = "";
      }
    }
  } else {
    menu = getDefault();
  }
  renderAll();
  updateStatus();
  document.getElementById("curPass").textContent = getPass();
}

function getDefault() {
  return [
    {id:1,title:"Polevky",emoji:"",items:[{id:1,name:"Polevka dne",desc:"Dle denni nabidky",gramaz:"",price:""}]},
    {id:2,title:"Tepla jidla",emoji:"",items:[{id:1,name:"Jidlo dne 1",desc:"",gramaz:"",price:""},{id:2,name:"Jidlo dne 2",desc:"",gramaz:"",price:""}]},
    {id:3,title:"Studena kuchyne",emoji:"",items:[{id:1,name:"Salat dne",desc:"",gramaz:"",price:""}]},
    {id:4,title:"Cukrarska vyroba",emoji:"",items:[{id:1,name:"Zakusek dne",desc:"",gramaz:"",price:""},{id:2,name:"Dort na objednavku",desc:"Dle domluvy",gramaz:"",price:""}]},
    {id:5,title:"Napoje",emoji:"",items:[{id:1,name:"Kava",desc:"Espresso cappuccino latte",gramaz:"",price:""},{id:2,name:"Nealkoholicke napoje",desc:"",gramaz:"",price:""}]}
  ];
}

function save() {
  localStorage.setItem(SK, JSON.stringify(menu));
  document.getElementById("banner").classList.add("on");
}

function publish() {
  localStorage.setItem(SK, JSON.stringify(menu));
  localStorage.setItem(PUB, JSON.stringify(menu));
  localStorage.setItem(AT, new Date().toISOString());
  document.getElementById("banner").classList.remove("on");
  updateStatus();
  renderStats();
  toast("Jidelni listek byl publikovan!");
}

function updateStatus() {
  var at = localStorage.getItem(AT);
  var el = document.getElementById("status");
  if (at) {
    var d = new Date(at);
    el.innerHTML = "<strong>Naposledy publikovano:</strong> " + d.toLocaleDateString("cs-CZ",{day:"numeric",month:"long",year:"numeric"}) + " v " + d.toLocaleTimeString("cs-CZ",{hour:"2-digit",minute:"2-digit"}) + " &nbsp; <a href=\"jidelni-listek.html\" target=\"_blank\">Zobrazit verejnou stranku &rarr;</a>";
  } else {
    el.innerHTML = "Zatim nic publikovano. Pridejte polozky a kliknete <strong>Publikovat na web</strong>.";
  }
}

function changePass() {
  var a = document.getElementById("np1").value;
  var b = document.getElementById("np2").value;
  if (!a || a.length < 4) { toast("Heslo musi mit alespon 4 znaky."); return; }
  if (a !== b) { toast("Hesla se neshoduji!"); return; }
  localStorage.setItem(SP, a);
  document.getElementById("curPass").textContent = a;
  document.getElementById("np1").value = "";
  document.getElementById("np2").value = "";
  toast("Heslo bylo zmeneno!");
}

function renderAll() { renderSide(); renderStats(); renderCats(); }

function renderSide() {
  var h = "";
  for (var i = 0; i < menu.length; i++) {
    var c = menu[i];
    h += "<button class=\"side-btn\" data-cid=\"" + c.id + "\"><span class=\"dot\"></span>" + c.title + "<span style=\"margin-left:auto;font-size:12px;color:var(--muted)\">" + c.items.length + "</span></button>";
  }
  document.getElementById("sideCats").innerHTML = h;
  var btns = document.querySelectorAll("#sideCats .side-btn");
  for (var i = 0; i < btns.length; i++) {
    (function(id) {
      btns[i].addEventListener("click", function() {
        var el = document.getElementById("cat" + id);
        if (el) el.scrollIntoView({behavior:"smooth"});
      });
    })(menu[i].id);
  }
}

function renderStats() {
  var t = 0;
  for (var i = 0; i < menu.length; i++) t += menu[i].items.length;
  document.getElementById("stats").innerHTML =
    "<div class=\"stat\"><small>Kategorii</small><strong>" + menu.length + "</strong></div>" +
    "<div class=\"stat\"><small>Polozek</small><strong>" + t + "</strong></div>" +
    "<div class=\"stat\"><small>Dnes</small><strong style=\"font-size:16px\">" + new Date().toLocaleDateString("cs-CZ") + "</strong></div>" +
    "<div class=\"stat\"><small>Stav</small><strong style=\"font-size:16px;color:var(--green)\">Online</strong></div>";
}

function esc(s) {
  return (s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
}

function renderCats() {
  var h = "";
  for (var ci = 0; ci < menu.length; ci++) {
    var cat = menu[ci];
    var rows = "";
    for (var ii = 0; ii < cat.items.length; ii++) {
      var item = cat.items[ii];
      rows += "<tr>" +
        "<td><input class=\"ci n\" value=\"" + esc(item.name) + "\" placeholder=\"Nazev\" data-cid=\"" + cat.id + "\" data-iid=\"" + item.id + "\" data-f=\"name\"></td>" +
        "<td><input class=\"ci d\" value=\"" + esc(item.desc) + "\" placeholder=\"Popis\" data-cid=\"" + cat.id + "\" data-iid=\"" + item.id + "\" data-f=\"desc\"></td>" +
        "<td><input class=\"ci g\" value=\"" + esc(item.gramaz) + "\" placeholder=\"300g\" data-cid=\"" + cat.id + "\" data-iid=\"" + item.id + "\" data-f=\"gramaz\"></td>" +
        "<td><input class=\"ci p\" value=\"" + esc(item.price) + "\" placeholder=\"89 Kc\" data-cid=\"" + cat.id + "\" data-iid=\"" + item.id + "\" data-f=\"price\"></td>" +
        "<td><div class=\"ra\"><button class=\"del\" data-cid=\"" + cat.id + "\" data-iid=\"" + item.id + "\">x</button></div></td>" +
        "</tr>";
    }
    h += "<div class=\"cat\" id=\"cat" + cat.id + "\">" +
      "<div class=\"cat-hdr\"><div class=\"cat-hdr-l\">" +
      "<div class=\"cat-icon\">" + cat.emoji + "</div>" +
      "<input class=\"cat-name\" value=\"" + esc(cat.title) + "\" data-cid=\"" + cat.id + "\"></div>" +
      "<div style=\"display:flex;gap:8px;align-items:center\"><span class=\"cat-meta\">" + cat.items.length + " pol.</span>" +
      "<button class=\"btn btn-red\" style=\"padding:5px 10px;font-size:11px\" data-cid=\"" + cat.id + "\" id=\"delCat" + cat.id + "\">Smazat</button></div></div>" +
      "<table><thead><tr><th style=\"width:28%\">Nazev</th><th>Popis</th><th style=\"width:80px\">Gramaz</th><th style=\"width:90px\">Cena</th><th style=\"width:40px\"></th></tr></thead>" +
      "<tbody>" + rows + "</tbody></table>" +
      "<div class=\"add-row\"><button class=\"add-btn\" data-cid=\"" + cat.id + "\" id=\"addItem" + cat.id + "\">+ Pridat polozku</button></div>" +
      "</div>";
  }
  document.getElementById("cats").innerHTML = h;
  bindEvents();
}

function bindEvents() {
  var inputs = document.querySelectorAll(".ci");
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].addEventListener("change", function() {
      var cid = parseInt(this.dataset.cid);
      var iid = parseInt(this.dataset.iid);
      var f = this.dataset.f;
      var c = findCat(cid);
      if (c) {
        var item = findItem(c, iid);
        if (item) { item[f] = this.value; save(); }
      }
    });
  }
  var catNames = document.querySelectorAll(".cat-name");
  for (var i = 0; i < catNames.length; i++) {
    catNames[i].addEventListener("change", function() {
      var c = findCat(parseInt(this.dataset.cid));
      if (c) { c.title = this.value; save(); renderSide(); }
    });
  }
  var dels = document.querySelectorAll(".del");
  for (var i = 0; i < dels.length; i++) {
    dels[i].addEventListener("click", function() {
      var cid = parseInt(this.dataset.cid);
      var iid = parseInt(this.dataset.iid);
      var c = findCat(cid);
      if (c) {
        c.items = c.items.filter(function(x) { return x.id !== iid; });
        save(); renderCats(); renderSide();
      }
    });
  }
  var addBtns = document.querySelectorAll(".add-btn");
  for (var i = 0; i < addBtns.length; i++) {
    addBtns[i].addEventListener("click", function() {
      var cid = parseInt(this.dataset.cid);
      var c = findCat(cid);
      if (c) {
        var id = 0;
        for (var k = 0; k < c.items.length; k++) if (c.items[k].id > id) id = c.items[k].id;
        c.items.push({id: id+1, name:"", desc:"", gramaz:"", price:""});
        save(); renderCats(); renderSide();
        var rows = document.querySelectorAll("#cat" + cid + " tbody tr");
        var last = rows[rows.length - 1];
        if (last) { var inp = last.querySelector(".ci"); if (inp) inp.focus(); }
      }
    });
  }
  var delCatBtns = document.querySelectorAll("[id^=delCat]");
  for (var i = 0; i < delCatBtns.length; i++) {
    delCatBtns[i].addEventListener("click", function() {
      if (!confirm("Smazat kategorii?")) return;
      var cid = parseInt(this.dataset.cid);
      menu = menu.filter(function(x) { return x.id !== cid; });
      save(); renderAll();
    });
  }
}

function findCat(id) {
  for (var i = 0; i < menu.length; i++) if (menu[i].id === id) return menu[i];
  return null;
}
function findItem(cat, id) {
  for (var i = 0; i < cat.items.length; i++) if (cat.items[i].id === id) return cat.items[i];
  return null;
}

function addCat() {
  var id = 0;
  for (var i = 0; i < menu.length; i++) if (menu[i].id > id) id = menu[i].id;
  menu.push({id: id+1, title:"Nova kategorie", emoji:"", items:[]});
  save(); renderAll();
  setTimeout(function() {
    var el = document.getElementById("cat" + (id+1));
    if (el) el.scrollIntoView({behavior:"smooth"});
  }, 100);
}

function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("on");
  setTimeout(function() { t.classList.remove("on"); }, 3000);
}

// Wire up buttons via addEventListener - no inline onclick
document.getElementById("loginBtn").addEventListener("click", checkLogin);
document.getElementById("pwd").addEventListener("keydown", function(e) { if (e.key === "Enter") checkLogin(); });
document.getElementById("pubBtn").addEventListener("click", publish);
document.getElementById("pubBtn2").addEventListener("click", publish);
document.getElementById("pubBannerBtn").addEventListener("click", publish);
document.getElementById("addCatBtn").addEventListener("click", addCat);
document.getElementById("addCatBtn2").addEventListener("click", addCat);
document.getElementById("viewBtn").addEventListener("click", function() { window.open("jidelni-listek.html"); });
document.getElementById("savePassBtn").addEventListener("click", changePass);
document.getElementById("passBtn").addEventListener("click", function() { document.getElementById("passSection").scrollIntoView({behavior:"smooth"}); });

document.getElementById("pwd").focus();
</script>
</body>
</html>
