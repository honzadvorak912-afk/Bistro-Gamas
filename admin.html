<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Bistro Gamas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--dark:#1a1610;--bg:#f5f2ec;--white:#fff;--border:#e0d8cc;--muted:#8a7e6e;--text:#2c2218;--red:#c0392b;--green:#27ae60}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark)}
.login-box{background:var(--white);padding:48px;width:100%;max-width:400px;border-radius:4px}
.login-logo{font-size:22px;font-weight:500;color:var(--dark);margin-bottom:8px}
.login-logo span{color:var(--gold);font-style:italic}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.lbl{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:500}
.login-box input[type=password]{width:100%;font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;border:1px solid var(--border);border-radius:3px;outline:none;transition:.2s;margin-bottom:20px}
.login-box input[type=password]:focus{border-color:var(--gold)}
.login-btn{width:100%;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:500;background:var(--dark);color:var(--gold);border:none;padding:14px;cursor:pointer;border-radius:3px;transition:.2s}
.login-btn:hover{background:#2d2418}
.login-err{color:var(--red);font-size:13px;margin-top:12px;display:none;text-align:center}
#admin-screen{display:none}
.admin-header{background:var(--dark);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.admin-header .logo{font-size:18px;font-weight:500;color:#fff}
.admin-header .logo span{color:var(--gold);font-style:italic}
.badge{font-size:11px;background:rgba(201,168,76,.15);color:var(--gold);padding:4px 12px;border-radius:20px}
.admin-body{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 57px)}
.sidebar{background:var(--white);border-right:1px solid var(--border);padding:24px 0}
.sidebar-section{padding:0 16px;margin-bottom:8px}
.sidebar-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 8px 6px;font-weight:500}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:3px;cursor:pointer;font-size:14px;color:var(--text);border:none;background:none;width:100%;text-align:left;transition:.15s}
.sidebar-item:hover{background:var(--bg)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.sidebar-add{display:flex;align-items:center;gap:8px;padding:10px 12px 10px 24px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:.15s}
.sidebar-add:hover{color:var(--gold)}
.main{padding:28px 36px;overflow-y:auto}
.main-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.main-title{font-size:20px;font-weight:500}
.main-actions{display:flex;gap:10px}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;font-weight:500;padding:10px 20px;border-radius:3px;cursor:pointer;transition:.2s;border:none}
.btn-primary{background:var(--gold);color:var(--dark)}.btn-primary:hover{background:#b8922a}
.btn-secondary{background:var(--white);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#a93226}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:18px 22px}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.stat-value{font-size:26px;font-weight:500;color:var(--dark)}
.category-block{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:16px;overflow:hidden}
.category-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:#fafaf8}
.category-name-wrap{display:flex;align-items:center;gap:10px}
.category-icon{width:30px;height:30px;background:var(--bg);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px}
.category-title-input{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;border:none;background:transparent;outline:none;color:var(--dark);width:200px}
.category-title-input:focus{border-bottom:1px solid var(--gold)}
.category-meta{font-size:12px;color:var(--muted)}
.category-actions{display:flex;gap:8px;align-items:center}
.items-table{width:100%;border-collapse:collapse}
.items-table th{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-weight:500}
.items-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.items-table tr:last-child td{border-bottom:none}
.items-table tr:hover td{background:#fafaf8}
.cell-input{font-family:'DM Sans',sans-serif;border:none;background:transparent;outline:none;color:var(--text);width:100%;padding:3px 5px;border-radius:2px;font-size:14px}
.cell-input.name{font-weight:500}
.cell-input.desc{font-size:13px;color:var(--muted)}
.cell-input.price{color:var(--gold);font-weight:500;width:90px}
.cell-input.gramaz{color:var(--muted);font-size:13px;width:80px}
.cell-input:focus{background:var(--bg);border-bottom:1px solid var(--gold)}
.row-actions{display:flex;gap:4px;opacity:0;transition:.15s}
tr:hover .row-actions{opacity:1}
.icon-btn{background:none;border:1px solid var(--border);border-radius:3px;padding:4px 8px;cursor:pointer;font-size:12px;color:var(--muted);transition:.15s}
.icon-btn:hover{border-color:var(--red);color:var(--red)}
.add-item-row{padding:10px 14px;border-top:1px solid var(--border)}
.add-item-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;padding:5px 7px;border-radius:3px}
.add-item-btn:hover{color:var(--gold);background:var(--bg)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:14px 22px;border-radius:4px;font-size:14px;transform:translateY(80px);opacity:0;transition:.3s;z-index:999;border-left:3px solid var(--green)}
.toast.show{transform:none;opacity:1}
.publish-banner{background:#fdf6e8;border:1px solid rgba(201,168,76,.3);border-radius:4px;padding:14px 18px;display:none;align-items:center;justify-content:space-between;margin-bottom:20px}
.publish-banner.visible{display:flex}
.publish-banner p{font-size:14px;color:#7a5c1e}
.pub-status{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:16px 20px;margin-top:20px;font-size:13px;color:var(--muted);line-height:1.7}
.pub-status strong{color:var(--dark)}
.pub-status a{color:var(--gold)}
.pass-box{background:var(--white);border:1px solid var(--border);border-radius:4px;padding:24px;margin-top:16px}
.pass-box h3{font-size:14px;font-weight:500;margin-bottom:4px}
.pass-box .hint{font-size:12px;color:var(--muted);margin-bottom:16px}
.pass-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pass-row input{flex:1;min-width:140px;font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;border:1px solid var(--border);border-radius:3px;outline:none;transition:.2s}
.pass-row input:focus{border-color:var(--gold)}
@media(max-width:900px){.admin-body{grid-template-columns:1fr}.sidebar{display:none}.stats-row{grid-template-columns:1fr 1fr}.main{padding:16px}}
</style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Bistro <span>Gamas</span></div>
    <p class="login-sub">Administrace jidelniho listku</p>
    <label class="lbl">Heslo</label>
    <input type="password" id="pwd" placeholder="Zadejte heslo" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Prihlasit se</button>
    <p class="login-err" id="login-err">Nespravne heslo, zkuste znovu.</p>
  </div>
</div>
<div id="admin-screen">
  <div class="admin-header">
    <div class="logo">Bistro <span>Gamas</span> &nbsp;·&nbsp; <span style="font-size:13px;color:rgba(255,255,255,.4)">Admin</span></div>
    <span class="badge">Jidelni listek</span>
  </div>
  <div class="admin-body">
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Kategorie</div>
        <div id="sidebar-cats"></div>
        <button class="sidebar-add" onclick="addCategory()">+ Pridat kategorii</button>
      </div>
      <div class="sidebar-section" style="margin-top:20px;border-top:1px solid var(--border);padding-top:14px">
        <div class="sidebar-label">Akce</div>
        <button class="sidebar-item" onclick="publishMenu()"><span class="dot" style="background:var(--green)"></span>Publikovat na web</button>
        <button class="sidebar-item" onclick="window.open('jidelni-listek.html')"><span class="dot"></span>Zobrazit web</button>
        <button class="sidebar-item" onclick="scrollToPass()"><span class="dot"></span>Zmenit heslo</button>
      </div>
    </div>
    <div class="main">
      <div class="publish-banner" id="pub-banner">
        <p>Mate neulozene zmeny</p>
        <button class="btn btn-primary" onclick="publishMenu()">Publikovat na web</button>
      </div>
      <div class="main-header">
        <div class="main-title">Sprava jidelniho listku</div>
        <div class="main-actions">
          <button class="btn btn-secondary" onclick="addCategory()">+ Nova kategorie</button>
          <button class="btn btn-primary" onclick="publishMenu()">Publikovat na web</button>
        </div>
      </div>
      <div class="stats-row" id="stats-row"></div>
      <div id="cats-container"></div>
      <div class="pub-status" id="pub-status"></div>
      <div class="pass-box" id="pass-section">
        <h3>Zmena hesla</h3>
        <p class="hint">Aktualni heslo: <strong id="cur-pass-display"></strong></p>
        <div class="pass-row">
          <input type="password" id="new-pass" placeholder="Nove heslo (min. 4 znaky)">
          <input type="password" id="new-pass2" placeholder="Zopakujte heslo">
          <button class="btn btn-secondary" onclick="changePass()">Ulozit</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var DEFAULT_PASS = 'gamas2024';
var SK = 'gamas_menu_v1';
var SK_PUB = 'gamas_menu_published';
var SK_AT = 'gamas_menu_published_at';
var SK_PASS = 'gamas_admin_pass';
var menu = [];

function getPass() {
  var p = localStorage.getItem(SK_PASS);
  return (p && p.length >= 4) ? p : DEFAULT_PASS;
}

function doLogin() {
  var entered = document.getElementById('pwd').value;
  var correct = getPass();
  if (entered === correct) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pwd').select();
  }
}

function initAdmin() {
  var s = localStorage.getItem(SK);
  if (s) {
    menu = JSON.parse(s);
    menu.forEach(function(c) {
      c.items.forEach(function(i) {
        if (i.gramaz === undefined) i.gramaz = '';
      });
    });
  } else {
    menu = JSON.parse(JSON.stringify(defaultMenu));
  }
  renderAll();
  updatePubStatus();
  document.getElementById('cur-pass-display').textContent = getPass();
}

function changePass() {
  var a = document.getElementById('new-pass').value;
  var b = document.getElementById('new-pass2').value;
  if (!a || a.length < 4) { showToast('Heslo musi mit alespon 4 znaky.'); return; }
  if (a !== b) { showToast('Hesla se neshoduji!'); return; }
  localStorage.setItem(SK_PASS, a);
  document.getElementById('cur-pass-display').textContent = a;
  document.getElementById('new-pass').value = '';
  document.getElementById('new-pass2').value = '';
  showToast('Heslo bylo uspesne zmeneno!');
}

function scrollToPass() {
  document.getElementById('pass-section').scrollIntoView({behavior:'smooth'});
}

function save() {
  localStorage.setItem(SK, JSON.stringify(menu));
  document.getElementById('pub-banner').classList.add('visible');
}

function publishMenu() {
  localStorage.setItem(SK, JSON.stringify(menu));
  localStorage.setItem(SK_PUB, JSON.stringify(menu));
  localStorage.setItem(SK_AT, new Date().toISOString());
  document.getElementById('pub-banner').classList.remove('visible');
  updatePubStatus();
  renderStats();
  showToast('Jidelni listek byl publikovan na web!');
}

function updatePubStatus() {
  var at = localStorage.getItem(SK_AT);
  var el = document.getElementById('pub-status');
  if (at) {
    var d = new Date(at);
    el.innerHTML = '<strong>Naposledy publikovano:</strong> ' + d.toLocaleDateString('cs-CZ',{day:'numeric',month:'long',year:'numeric'}) + ' v ' + d.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}) + ' &nbsp; <a href="jidelni-listek.html" target="_blank">Zobrazit verejnou stranku &rarr;</a>';
  } else {
    el.innerHTML = 'Zatim nic publikovano. Pridejte polozky a kliknete <strong>Publikovat na web</strong>.';
  }
}

function renderAll() { renderSidebar(); renderStats(); renderCategories(); }

function renderSidebar() {
  document.getElementById('sidebar-cats').innerHTML = menu.map(function(c) {
    return '<button class="sidebar-item" onclick="document.getElementById('cat-' + c.id + '').scrollIntoView({behavior:'smooth'})"><span class="dot"></span>' + c.title + '<span style="margin-left:auto;font-size:12px;color:var(--muted)">' + c.items.length + '</span></button>';
  }).join('');
}

function renderStats() {
  var t = menu.reduce(function(s,c){return s+c.items.length;},0);
  document.getElementById('stats-row').innerHTML =
    '<div class="stat-card"><div class="stat-label">Kategorii</div><div class="stat-value">' + menu.length + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Polozek</div><div class="stat-value">' + t + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Dnes</div><div class="stat-value" style="font-size:16px">' + new Date().toLocaleDateString('cs-CZ') + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Stav</div><div class="stat-value" style="font-size:16px;color:var(--green)">Online</div></div>';
}

function esc(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function renderCategories() {
  document.getElementById('cats-container').innerHTML = menu.map(function(cat) {
    var rows = cat.items.map(function(item) {
      return '<tr>' +
        '<td><input class="cell-input name" value="' + esc(item.name) + '" placeholder="Nazev" onchange="updateItem(' + cat.id + ',' + item.id + ','name',this.value)"></td>' +
        '<td><input class="cell-input desc" value="' + esc(item.desc) + '" placeholder="Popis" onchange="updateItem(' + cat.id + ',' + item.id + ','desc',this.value)"></td>' +
        '<td><input class="cell-input gramaz" value="' + esc(item.gramaz) + '" placeholder="300g" onchange="updateItem(' + cat.id + ',' + item.id + ','gramaz',this.value)"></td>' +
        '<td><input class="cell-input price" value="' + esc(item.price) + '" placeholder="89 Kc" onchange="updateItem(' + cat.id + ',' + item.id + ','price',this.value)"></td>' +
        '<td><div class="row-actions"><button class="icon-btn" onclick="deleteItem(' + cat.id + ',' + item.id + ')">x</button></div></td>' +
        '</tr>';
    }).join('');
    return '<div class="category-block" id="cat-' + cat.id + '">' +
      '<div class="category-head"><div class="category-name-wrap"><div class="category-icon">' + cat.emoji + '</div>' +
      '<input class="category-title-input" value="' + esc(cat.title) + '" onchange="updateCat(' + cat.id + ','title',this.value)"></div>' +
      '<div class="category-actions"><span class="category-meta">' + cat.items.length + ' pol.</span>' +
      '<button class="btn btn-danger" style="padding:5px 10px;font-size:11px" onclick="deleteCat(' + cat.id + ')">Smazat</button></div></div>' +
      '<table class="items-table"><thead><tr><th style="width:28%">Nazev</th><th>Popis</th><th style="width:80px">Gramaz</th><th style="width:90px">Cena</th><th style="width:40px"></th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>' +
      '<div class="add-item-row"><button class="add-item-btn" onclick="addItem(' + cat.id + ')">+ Pridat polozku</button></div></div>';
  }).join('');
}

function updateCat(id,f,v){var c=menu.find(function(x){return x.id===id;});if(c){c[f]=v;save();renderSidebar();}}
function updateItem(cid,iid,f,v){var c=menu.find(function(x){return x.id===cid;});if(c){var i=c.items.find(function(x){return x.id===iid;});if(i){i[f]=v;save();}}}
function addItem(cid){var c=menu.find(function(x){return x.id===cid;});if(c){var id=(c.items.reduce(function(m,i){return Math.max(m,i.id);},0))+1;c.items.push({id:id,name:'',desc:'',gramaz:'',price:''});save();renderCategories();renderSidebar();setTimeout(function(){var inp=document.querySelector('#cat-'+cid+' tbody tr:last-child .cell-input');if(inp)inp.focus();},50);}}
function deleteItem(cid,iid){var c=menu.find(function(x){return x.id===cid;});if(c){c.items=c.items.filter(function(i){return i.id!==iid;});save();renderCategories();renderSidebar();}}
function addCategory(){var id=(menu.reduce(function(m,c){return Math.max(m,c.id);},0))+1;menu.push({id:id,title:'Nova kategorie',emoji:'',items:[]});save();renderAll();setTimeout(function(){var el=document.getElementById('cat-'+id);if(el)el.scrollIntoView({behavior:'smooth'});},100);}
function deleteCat(id){if(!confirm('Smazat kategorii?'))return;menu=menu.filter(function(c){return c.id!==id;});save();renderAll();}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}

var defaultMenu = [
  {id:1,title:'Polevky',emoji:'',items:[{id:1,name:'Polevka dne',desc:'Dle denni nabidky',gramaz:'',price:''}]},
  {id:2,title:'Tepla jidla',emoji:'',items:[{id:1,name:'Jidlo dne 1',desc:'',gramaz:'',price:''},{id:2,name:'Jidlo dne 2',desc:'',gramaz:'',price:''}]},
  {id:3,title:'Studena kuchyne',emoji:'',items:[{id:1,name:'Salat dne',desc:'',gramaz:'',price:''}]},
  {id:4,title:'Cukrarska vyroba',emoji:'',items:[{id:1,name:'Zakusek dne',desc:'',gramaz:'',price:''},{id:2,name:'Dort na objednavku',desc:'Dle domluvy',gramaz:'',price:''}]},
  {id:5,title:'Napoje',emoji:'',items:[{id:1,name:'Kava',desc:'Espresso cappuccino latte',gramaz:'',price:''},{id:2,name:'Nealkoholicke napoje',desc:'',gramaz:'',price:''}]}
];

document.getElementById('pwd').focus();
</script>
</body>
</html>
