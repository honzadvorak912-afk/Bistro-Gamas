<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bistro Gamas – Hlinsko</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold2:#e8d49e;
  --dark:#0e0c09;--dark2:#1a1610;--dark3:#261f16;
  --cream:#f5f0e8;--text:#3a3228;--muted:#7a6e5e;
}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--dark);color:var(--cream);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:24px 56px;transition:all .4s}
nav.scrolled{background:rgba(14,12,9,.95);padding:14px 56px;backdrop-filter:blur(10px)}
.logo{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#fff;text-decoration:none;letter-spacing:1px}
.logo span{color:var(--gold);font-style:italic}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.65);text-decoration:none;font-weight:400;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* HERO */
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:-10%;background:url('https://honzadvorak912-afk.github.io/Bistro-Gamas/phoca_thumb_m_023-0010.jpg"nav">
  <a href="index.html" class="logo">Bistro <em>Gamas</em></a>
  <button class="hamburger" id="hbg"><span></span><span></span><span></span></button>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Domů</a></li>
    <li><a href="jidelni-listek.html">Jídelní lístek</a></li>
    <li><a href="catering.html">Catering</a></li>
    <li><a href="fotogalerie.html">Fotogalerie</a></li>
    <li><a href="kontakt.html">Kontakt</a></li>
  </ul>
</nav>
<div class="mobile-menu" id="mob"><a href="index.html">Domu</a><a href="jidelni-listek.html">Jidelni listek</a><a href="catering.html">Catering</a><a href="fotogalerie.html">Fotogalerie</a><a href="kontakt.html">Kontakt</a></div>


<section class="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <div class="hero-tag">Bistro &amp; Restaurace · Hlinsko</div>
    <h1 class="hero-title">Chuť,<br>která <em>zůstane</em></h1>
    <p class="hero-sub">Nádražní 1105 · 539 01 Hlinsko · Od 5:00 hod.</p>
    <div class="hero-cta">
      <a href="jidelni-listek.html" class="btn-primary">Jídelní lístek</a>
      <a href="kontakt.html" class="btn-ghost">Kontakt</a>
    </div>
  </div>
  <div class="scroll-line"><span>Scroll</span></div>
</section>

<section class="about">
  <div class="about-img">
    <img src="https://honzadvorak912-afk.github.io/Bistro-Gamas/phoca_thumb_m_089.jpg" alt="Bistro Gamas interiér">
  </div>
  <div class="about-text">
    <p class="section-label reveal">O nás</p>
    <h2 class="section-title reveal delay1">Domácí kuchyně<br>s <em>vášní</em></h2>
    <div class="gold-bar reveal delay2"></div>
    <p class="reveal delay2">Bistro Gamas je místem, kde se setkávají chutě domácí kuchyně s profesionálním přístupem. Vaříme pro vás každý den od brzkého rána.</p>
    <p class="reveal delay3">Nabízíme teplá i studená jídla, cukrářskou výrobu, catering a rauty. Jsme tu pro vás, když chcete dobře jíst — ať už na snídani, oběd nebo firemní akci.</p>
  </div>
</section>

<section class="highlights">
  <div style="text-align:center">
    <p class="section-label reveal">Co nabízíme</p>
    <h2 class="section-title reveal delay1" style="color:#fff">Naše <em>speciality</em></h2>
  </div>
  <div class="highlights-grid">
    <div class="highlight-card reveal delay1">
      <img src="https://honzadvorak912-afk.github.io/Bistro-Gamas/phoca_thumb_m_026-0022.jpg" alt="Teplá jídla">
      <div class="highlight-info"><h3>Teplá jídla</h3><p>Denní menu</p></div>
      <a href="jidelni-listek.html"></a>
    </div>
    <div class="highlight-card reveal delay2">
      <img src="https://honzadvorak912-afk.github.io/Bistro-Gamas/phoca_thumb_m_cukrarska_vyroba091.jpg" alt="Cukrářská výroba">
      <div class="highlight-info"><h3>Cukrářská výroba</h3><p>Dorty &amp; zákusky</p></div>
      <a href="jidelni-listek.html"></a>
    </div>
    <div class="highlight-card reveal delay3">
      <img src="https://honzadvorak912-afk.github.io/Bistro-Gamas/phoca_thumb_m_rauty001-0001.jpg" alt="Catering">
      <div class="highlight-info"><h3>Catering &amp; Rauty</h3><p>Firemní akce</p></div>
      <a href="catering.html"></a>
    </div>
  </div>
</section>

<div class="hours-strip reveal">
  <h2>Otevírací doba</h2>
  <div class="hours-list">
    <div class="hour-item"><strong>Po – Pá</strong>5:00 – 17:00</div>
    <div class="hour-item"><strong>Sobota</strong>Jen na akce</div>
    <div class="hour-item"><strong>Neděle</strong>Zavřeno</div>
  </div>
  <a href="kontakt.html">Kontaktujte nás</a>
</div>

<footer>
  <span class="footer-logo">Bistro <em>Gamas</em></span>
  <div class="footer-divider"></div>
  <p>Nádražní 1105 · 539 01 Hlinsko</p>
  <p><a href="tel:+420728478333">728 478 333</a> · <a href="tel:+420469311786">+420 469 311 786</a></p>
  <p><a href="mailto:poslusna.gastro@seznam.cz">poslusna.gastro@seznam.cz</a></p>
</footer>

<script>
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>60),{passive:true});
const reveals=document.querySelectorAll('.reveal');
new IntersectionObserver((e)=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('visible')),{threshold:.12}).observe&&reveals.forEach(el=>new IntersectionObserver((e)=>e.forEach(x=>x.isIntersecting&&x.target.classList.add('visible')),{threshold:.12}).observe(el));

var _h=document.getElementById("hbg"),_m=document.getElementById("mob");if(_h&&_m){_h.addEventListener("click",function(){_h.classList.toggle("open");_m.classList.toggle("open");});}
</script>
</body>
</html>
