<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jidelni listek Bistro Gamas</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#b8922a;--gold2:#e8d49e;--dark:#1c1812;--cream:#faf7f2;--cream2:#f0ebe0;--text:#2e2820;--muted:#7a6e5e;--border:rgba(184,146,42,.2)}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--tehxt);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 56px;background:var(--cream);border-bottom:1px solid var(--border);transition:padding .3s}
nav.scrolled{padding:12px 56px}
.logo{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;color:var(--dark);text-decoration:none}
.logo em{font-style:italic;color:var(--gold)}
.nav-links{display:flex;gap:32px;list-style:none}
.nav-links a{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;font-weight:400;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}
.page-header{padding:160px 56px 80px;background:var(--dark);text-align:center;position:relative;overflow:hidden}
.page-header::before{content:'MENU';position:absolute;font-family:'Libre Baskerville',serif;font-size:220px;font-weight:700;color:rgba(255,255,255,.03);top:50%;left:50%;transform:translate(-50%,-50%);white-space:nowrap;pointer-events:none}
.page-header .tag{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold2);margin-bottom:16px}
.page-header h1{font-family:'Libre Baskerville',serif;font-size:clamp(40px,6vw,72px);font-weight:400;color:#fff;line-height:1.1}
.page-header h1 em{font-style:italic;color:var(--gold2)}
.updated{font-size:12px;color:rgba(255,255,255,.3);margin-top:16px;letter-spacing:1px}
.menu-nav{display:flex;justify-content:center;padding:0 56px;background:#fff;border-bottom:2px solid var(--cream2);overflow-x:auto;flex-wrap:wrap}
.menu-tab{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:20px 22px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-weight:500;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif}
.menu-tab.active,.menu-tab:hover{color:var(--gold);border-bottom-color:var(--gold)}
.menu-content{max-width:900px;margin:0 auto;padding:80px 56px}
.menu-empty{text-align:center;padding:80px 24px;color:var(--muted)}
.menu-empty h3{font-family:'Libre Baskerville',serif;font-size:24px;margin-bottom:12px;font-weight:400;font-style:italic}
.menu-empty p{font-size:14px;line-height:1.8}
.menu-empty a{color:var(--gold)}
.cat-title{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:400;font-style:italic;color:var(--dark);padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:28px}
.menu-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px dotted var(--border)}
.menu-item:last-child{border-bottom:none}
